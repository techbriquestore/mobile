<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <circle cx="40" cy="40" r="40" fill="#FF8C00"/>
  <!-- Compass/person icon -->
  <g transform="translate(40,40)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-12" r="4" fill="white"/>
    <!-- Body -->
    <line x1="0" y1="-8" x2="0" y2="4"/>
    <!-- Arms -->
    <line x1="-10" y1="-2" x2="10" y2="-2"/>
    <!-- Left leg -->
    <line x1="0" y1="4" x2="-8" y2="16"/>
    <!-- Right leg -->
    <line x1="0" y1="4" x2="8" y2="16"/>
  </g>
</svg>
